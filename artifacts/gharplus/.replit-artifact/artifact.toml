kind = "mobile"
previewPath = "/"
title = "GharPlus"
version = "1.0.0"
id = "artifacts/gharplus"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19421

[services.development]
run = "pnpm --filter @workspace/gharplus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gharplus", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/gharplus", "run", "serve" ]

[services.env]
PORT = "19421"
BASE_PATH = "/"
